[platformio]
default_envs = esp32c3_supermini

[env:esp32c3_supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; --- C3 Hardware Serial (Hoverboard) ---
    ; Pins 20/21 are broken out on the 16-pin SuperMini
    -D HOVER_SERIAL_RX=20
    -D HOVER_SERIAL_TX=21

    ; --- SPI TFT Pins (RESTORED FROM BACKUP) ---
    -D TFT_SCK=8
    -D TFT_MOSI=10
    -D TFT_CS=7
    -D TFT_DC=2
    -D TFT_RST=3
    -D TFT_BLK=0

    ; --- Encoder Pins (Safe Boot Mapping) ---
    -D ENC_CLK=5
    -D ENC_DT=4
    -D ENC_SW=1

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
    igorantolic/Ai Esp32 Rotary Encoder
