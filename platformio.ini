[platformio]
default_envs = esp32s3_custom

[env:esp32s3_custom]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
framework = arduino
monitor_speed = 115200

# Fix for 4MB Flash Mode
board_upload.flash_size = 4MB
board_build.partitions = huge_app.csv
board_build.arduino.memory_type = qio_opi
build_flags = 
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    
    ; --- Verified Trundler Pin Config (S3) ---
    -D HOVER_SERIAL_RX=44
    -D HOVER_SERIAL_TX=43
    
    ; --- Display Pins (ST7789 from Golf GPS) ---
    -D TFT_MOSI=4
    -D TFT_SCK=6
    -D TFT_CS=7
    -D TFT_DC=2
    -D TFT_RST=3

    ; --- Button Pins (Integrated 5-Button Set) ---
    -D BTN_FWD=12
    -D BTN_REV=5
    -D BTN_LEFT=10
    -D BTN_RIGHT=11
    -D BTN_STOP=1

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
