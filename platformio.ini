[platformio]
default_envs = esp32c3_supermini

[env:esp32c3_supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    
    ; --- C3 Hardware Serial (Hoverboard) ---
    -D HOVER_SERIAL_RX=20
    -D HOVER_SERIAL_TX=21
    
    ; --- Display Pins (Photo Verified) ---
    -D TFT_SCK=8
    -D TFT_MOSI=10
    -D TFT_CS=7
    -D TFT_DC=2
    -D TFT_RST=3

    ; --- Button Pins (Photo Verified) ---
    -D BTN_FWD=4
    -D BTN_REV=1
    -D BTN_STOP=0
    -D BTN_LEFT=6
    -D BTN_RIGHT=5

lib_deps =
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library
